# Mapo Configuration
# Copy this file and customize for your deployment.
# Environment variables override these settings (see .env.example).

# --- Authentication ---
# Set in .env file (not here — passwords shouldn't be in yaml):
#   MAPO_USERNAME=admin
#   MAPO_PASSWORD=changeme
#   MAPO_TOTP_SECRET=JBSWY3DPEHPK3PXP   # optional MFA

# --- Limits & Safeguards ---
# Hard caps that prevent runaway jobs. Server enforces these on every request.
# limits:
#   max_results_per_query: 5000      # cap on max_results param
#   max_cities_per_job: 200          # cap on city expansion
#   max_total_places: 10000          # absolute ceiling per job
#   max_concurrent_jobs: 3           # how many jobs can run at once
#   max_runtime_minutes: 120         # auto-cancel after N minutes
#   warn_threshold: 1000             # UI warning above this estimated total

# --- Scraping Tuning ---
# scraping:
#   browser: camoufox            # camoufox (Firefox, default) or patchright (Chromium)
#   concurrency: 5            # parallel HTTP requests for place pages (1-20)
#   min_delay: 0.5            # minimum delay between actions (seconds)
#   max_delay: 2.0            # maximum delay between actions (seconds)
#   scroll_timeout: 40        # seconds before declaring scroll stuck
#   headless: true            # false = show browser window (debug mode)
#   default_zoom: 14          # default map zoom level (1-21)

# --- Proxy ---
# proxy:
#   enabled: false
#   urls:
#     - "http://user:pass@proxy1.example.com:8080"
#     - "socks5://user:pass@proxy2.example.com:1080"
#   rotation: round_robin     # round_robin, random, geo_match
#   geo_match: false           # match proxy location to search region

# --- Enrichment (emails + social links) ---
# enrichment:
#   provider: rapidapi         # rapidapi, hunter, apollo
#   api_key: ""

# --- AI (lead scoring + review analysis) ---
# ai:
#   enabled: false
#   provider: anthropic        # anthropic, openai, gemini, vllm
#   api_key: ""
#   model: ""                  # claude-sonnet-4-20250514, gpt-4o, gemini-2.0-flash
#   base_url: ""               # vLLM only: http://localhost:8001/v1
#
#   # Define your target customer — every lead gets scored against it:
#   icp: |
#     Small restaurants with 50-200 reviews, 4+ stars,
#     no website or basic website, in major US cities.
#     Prefer businesses spending on Google Ads.
#     Skip chains and franchises.
#
#   # What you're selling — used to tailor pitch summaries:
#   product_description: |
#     Custom websites for restaurants with online ordering,
#     SEO optimization, and Google Ads management.
#     Starting at $1,500 + $40/month hosting.

